services:
  postgres:
    image: postgres:17
    container_name: task_manager_db
    environment:
      POSTGRES_DB: task_manager_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: leo123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: task_manager_app
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/task_manager_api
      DB_USERNAME: postgres
      DB_PASSWORD: leo123
    ports:
      - "8080:8080"

volumes:
  postgres_data: